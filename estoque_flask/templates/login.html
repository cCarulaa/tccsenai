{% extends "base.html" %}

{% block content %}


<div class="login-shell">

    <div class="login-panel">

        <form class="auth-card" method="post">

            <h2>Login</h2>

            <div class="mb-3">
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Usuário">
            </div>

            <div class="mb-3">
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Senha">
            </div>

            <button type="submit" class="login-btn">
                →
            </button>

        </form>

    </div>

</div>

{% endblock %}
